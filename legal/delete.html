<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Data Delete Request — Gate Register</title>
<style>
  :root{--bg:#F1F5F9;--card:#fff;--ink:#0f172a;--mut:#64748b;--brand:#6366f1;--line:#e2e8f0;--danger:#dc2626}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,'Segoe UI',Inter,Roboto,sans-serif;background:var(--bg);color:var(--ink);line-height:1.6}
  .wrap{max-width:640px;margin:0 auto;padding:32px 22px 80px}
  .card{background:var(--card);border-radius:16px;padding:28px 24px;box-shadow:0 1px 3px rgba(15,23,42,.05)}
  h1{margin:0 0 6px;font-size:24px;letter-spacing:-.02em}
  .meta{color:var(--mut);font-size:13px;margin-bottom:18px}
  .info{background:#fef3c7;border:1px solid #fde68a;padding:12px 14px;border-radius:10px;font-size:13.5px;margin:14px 0 20px;color:#78350f}
  label{display:block;font-size:13px;color:var(--mut);margin:14px 0 6px;font-weight:600}
  input,textarea,select{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:10px;font-size:14.5px;background:#fff;font-family:inherit}
  textarea{min-height:88px;resize:vertical}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(99,102,241,.12)}
  .btn{margin-top:22px;width:100%;padding:13px;background:var(--danger);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer}
  .btn:hover{background:#b91c1c}
  .foot{margin-top:36px;color:var(--mut);font-size:12px;text-align:center}
  a{color:var(--brand);text-decoration:none}
  a:hover{text-decoration:underline}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media (max-width:520px){.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1>Delete my data</h1>
    <div class="meta">Gate Register app</div>

    <div class="info">
      Aap apna data 3 tareeko se delete karwa sakte hain:<br>
      <b>1)</b> App ke andar: Setup → "Mera data delete karo"<br>
      <b>2)</b> Ye form bharo (neeche) — hum 7 din ke andar delete karenge<br>
      <b>3)</b> Direct email: <a href="mailto:sandipdubey773@gmail.com">sandipdubey773@gmail.com</a>
    </div>

    <form id="f" onsubmit="return submitForm(event)">
      <label>Aapka naam *</label>
      <input required id="name" placeholder="Sandeep Dubey">

      <div class="row">
        <div>
          <label>Phone number *</label>
          <input required id="phone" type="tel" placeholder="98xxxxxxxx">
        </div>
        <div>
          <label>Society name *</label>
          <input required id="soc" placeholder="Green Meadows">
        </div>
      </div>

      <div class="row">
        <div>
          <label>Tower</label>
          <input id="tower" placeholder="A / B / C">
        </div>
        <div>
          <label>Flat number</label>
          <input id="flat" placeholder="101">
        </div>
      </div>

      <label>Role</label>
      <select id="role">
        <option value="Member">Flat member</option>
        <option value="Owner">Flat owner</option>
        <option value="Secretary">Tower secretary</option>
        <option value="Guard">Guard</option>
        <option value="Admin">Society admin</option>
      </select>

      <label>Kya-kya delete karna hai?</label>
      <textarea id="what" placeholder="Sab (default): member record, phone number, push token, aur visitor entries jo mere flat pe hain."></textarea>

      <button type="submit" class="btn">Delete request bhejo</button>
    </form>
  </div>

  <div class="foot">
    <a href="privacy.html">← Privacy Policy</a> · <a href="terms.html">Terms</a> · <a href="index.html">Legal home</a>
  </div>
</div>

<script>
function submitForm(e){
  e.preventDefault();
  const g = id => document.getElementById(id).value.trim();
  const name = g('name'), phone = g('phone'), soc = g('soc');
  if(!name || !phone || !soc){ alert('Naam, phone aur society name zaroori hai.'); return false; }
  const body = `DATA DELETE REQUEST — Gate Register

Name: ${name}
Phone: ${phone}
Society: ${soc}
Tower: ${g('tower') || '-'}
Flat: ${g('flat') || '-'}
Role: ${g('role')}

Delete karna hai:
${g('what') || 'Sab: member record, phone number, push token, meri flat ke visitor entries.'}

---
Submitted: ${new Date().toISOString()}
Via: gate-register-admin/legal/delete.html`;

  const mailto = 'mailto:sandipdubey773@gmail.com'
    + '?subject=' + encodeURIComponent('Data Delete Request — Gate Register')
    + '&body=' + encodeURIComponent(body);

  window.location.href = mailto;
  setTimeout(()=>{
    alert('Email app khul jayegi. Send dabao — hum 7 din ke andar delete kar denge.\n\nAgar email app nahi khuli, direct sandipdubey773@gmail.com pe manually likh do.');
  }, 800);
  return false;
}
</script>
</body>
</html>
